<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TCG</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body, #root {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
    </style>
    <script>
        // ui_page creates a fullscreen NUI overlay — we must hide it.
        // Start hidden; only show when lb-phone's components.js confirms we're in the phone.
        document.documentElement.style.display = 'none';
        document.documentElement.style.visibility = 'hidden';
        function checkIfInPhone() {
            if (window.resourceName || window.componentsLoaded || window.fetchNui) {
                document.documentElement.style.display = '';
                document.documentElement.style.visibility = '';
                return true;
            }
            return false;
        }
        if (!checkIfInPhone()) {
            var _checkCount = 0;
            var _checkTimer = setInterval(function() {
                _checkCount++;
                if (checkIfInPhone() || _checkCount > 50) clearInterval(_checkTimer);
            }, 100);
        }
    </script>
